"""
TrustLink Attestation GraphQL API
"""

enum Status {
  ACTIVE
  REVOKED
}

type Attestation {
  id: String!
  issuer: String!
  subject: String!
  claimType: String!
  timestamp: String!
  expiration: String
  isRevoked: Boolean!
  metadata: String
  imported: Boolean!
  bridged: Boolean!
  sourceChain: String
  sourceTx: String
  createdAt: String!
  updatedAt: String!
}

type IssuerStats {
  issuer: String!
  total: Int!
  active: Int!
  revoked: Int!
  claimTypes: [String!]!
}

"""Pagination info for cursor-based pagination"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

"""Edge type for attestation connections"""
type AttestationEdge {
  node: Attestation!
  cursor: String!
}

"""Connection type for paginated attestations"""
type AttestationConnection {
  edges: [AttestationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Query {
  """Query attestations with optional filters and pagination"""
  attestations(
    subject: String, 
    claimType: String, 
    status: Status,
    first: Int,
    after: String
  ): AttestationConnection!

  """Query attestations by issuer with pagination"""
  attestationsByIssuer(
    issuer: String!,
    first: Int,
    after: String
  ): AttestationConnection!

  """Get statistics for a specific issuer"""
  issuerStats(issuer: String!): IssuerStats!
}

type Subscription {
  """Subscribe to new attestation creation events, optionally filtered by subject"""
  onAttestationCreated(subject: String): Attestation!
}
